# FRONTEND service on Railway — Docker container (Next.js)
# Root Directory: frontend  (recommended)  OR repo root with Dockerfile path frontend/Dockerfile

[build]
builder = "DOCKERFILE"
# Use "Dockerfile" when Root Directory = frontend; use "frontend/Dockerfile" when Root Directory = .
dockerfilePath = "Dockerfile"

[deploy]
# Must listen on $PORT (do not override in Railway UI with plain "npm run start").
startCommand = "node node_modules/next/dist/bin/next start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
